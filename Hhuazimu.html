<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花式字体生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f6f8;
            /* 给body添加顶部内边距，避免固定输入框遮挡内容 */
            padding-top: 120px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            /* 相对定位，让固定的输入框相对于容器对齐 */
            position: relative;
        }
        h2 {
            text-align: center;
            color: #222;
            margin-bottom: 25px;
            /* 调整标题位置，避开固定输入框 */
            margin-top: 10px;
        }
        #inputText {
            width: 100%;
            height: 100px;
            padding: 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: #4285f4 solid 2px;
            resize: vertical;
            /* 核心修改：固定定位 */
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 860px; /* 容器宽度 - 左右内边距 */
            z-index: 9999; /* 确保在最上层 */
            background: #fff; /* 背景色，避免透明 */
        }
        /* 新增：结果容器改为网格布局，左右两列 */
        #resultBox {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 6px;
            /* 移除原有的margin-bottom，改用grid的gap */
            word-break: break-all;
        }
        .result-text {
            font-size: 18px;
            color: #111;
        }
        .copy-btn {
            padding: 6px 14px;
            border: none;
            background: #4285f4;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .copy-btn:hover {
            background: #3367d6;
        }
        .tip {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            text-align: center;
        }
        /* 响应式适配：小屏幕变回单列 */
        @media (max-width: 600px) {
            #resultBox {
                grid-template-columns: 1fr;
            }
            /* 响应式调整固定输入框 */
            #inputText {
                max-width: calc(100% - 40px);
                top: 10px;
            }
            body {
                padding-top: 110px;
            }
        }
    </style>

        const input = document.getElementById('inputText');
        const resultBox = document.getElementById('resultBox');

        function convert(text, font) {
            return text.split('').map(c => font.map[c] || c).join('');
        }

        function render() {
            const text = input.value;
            resultBox.innerHTML = '';
            if (!text) return;

            safeFonts.forEach(font => {
                const res = convert(text, font);
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <span class="result-text">${res}</span>
                    <button class="copy-btn" data-text="${res}">复制</button>
                `;
                resultBox.appendChild(item);
            });
        }

        input.addEventListener('input', render);

        resultBox.addEventListener('click', async e => {
            if (e.target.classList.contains('copy-btn')) {
                const txt = e.target.dataset.text;
                await navigator.clipboard.writeText(txt);
                const old = e.target.innerText;
                e.target.innerText = '已复制!';
                setTimeout(() => e.target.innerText = old, 1200);
            }
        });
    </script>
